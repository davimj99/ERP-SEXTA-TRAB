<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; padding: 50px; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-salvar { background: #3498db; color: white; border: none; padding: 12px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; }
        .btn-voltar { display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 style="margin-bottom: 25px; color: #2c3e50;"><i class="fas fa-edit"></i> Editar Produto #{{ produto.id }}</h2>
        
        <form method="POST" action="/produtos/edit/{{ produto.id }}/">
            {% csrf_token %} 
            
            <div class="form-group">
                <label>Nome do Produto:</label>
                <input type="text" name="nome" value="{{ produto.nome }}" required>
            </div>
            
            <div class="form-group">
                <label>Descrição:</label>
                <textarea name="descricao" rows="4">{{ produto.descricao }}</textarea>
            </div>
            
            <div class="form-group">
                <label>Preço (R$):</label>
                <input type="number" step="0.01" name="preco" value="{{ produto.preco|stringformat:'.2f' }}" required>
            </div>
            
            <button type="submit" class="btn-salvar">Salvar Alterações</button>
        </form>

        <a href="/produtos/" class="btn-voltar">Cancelar e Voltar</a>
    </div>

</body>
</html>
