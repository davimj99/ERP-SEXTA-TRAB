{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'produtos/css/produto.css' %}">
</head>
<body>

    <div class="form-container">
        <h2 style="margin-bottom: 25px; color: #2c3e50;"><i class="fas fa-edit"></i> Editar Produto #{{ produto.id }}</h2>
        
        <form method="POST" action="/produtos/edit/{{ produto.id }}/">
            {% csrf_token %} 
            
            <div class="form-group">
                <label>Nome do Produto:</label>
                <input type="text" name="nome" value="{{ produto.nome }}" required>
            </div>
            
            <div class="form-group">
                <label>Descrição:</label>
                <textarea name="descricao" rows="4">{{ produto.descricao }}</textarea>
            </div>
            
            <div class="form-group">
                <label>Preço (R$):</label>
                <input type="number" step="0.01" name="preco" value="{{ produto.preco|stringformat:'.2f' }}" required>
            </div>
            
            <button type="submit" class="btn-salvar">Salvar Alterações</button>
        </form>

        <a href="/produtos/" class="btn-voltar">Cancelar e Voltar</a>
    </div>

</body>
</html>
