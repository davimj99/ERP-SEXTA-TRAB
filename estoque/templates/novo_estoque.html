<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Novo Estoque</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; padding: 50px; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 1rem;}
        .btn-salvar { background: #2ecc71; color: white; border: none; padding: 12px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; font-size: 1rem; }
        .btn-voltar { display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 style="margin-bottom: 25px; color: #2c3e50;"><i class="fas fa-boxes"></i> Entrada de Estoque</h2>
        
        <form method="POST" action="/estoque/new/">
            {% csrf_token %} 
            
            <div class="form-group">
                <label>Produto:</label>
                <select name="produto_id" required>
                    <option value="">Selecione um produto...</option>
                    {% for produto in produtos %}
                        <option value="{{ produto.id }}">{{ produto.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group" style="display: flex; gap: 15px;">
                <div style="flex: 1;">
                    <label>Quantidade:</label>
                    <input type="number" step="0.01" name="quantidade" required placeholder="Ex: 50">
                </div>
                <div style="flex: 1;">
                    <label>Unidade de Medida:</label>
                    <select name="unidade_medida" required>
                        <option value="UN">Unidade (UN)</option>
                        <option value="KG">Quilograma (KG)</option>
                        <option value="L">Litro (L)</option>
                        <option value="M">Metro (M)</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Custo Unitário (R$):</label>
                <input type="number" step="0.01" name="preco_unitario" required placeholder="Ex: 15.50">
            </div>
            
            <div class="form-group">
                <label>Data de Validade:</label>
                <input type="date" name="data_validade" placeholder="Ex: 2023-12-31">
            </div>

            <button type="submit" class="btn-salvar">Registrar Estoque</button>
        </form>

        <a href="/estoque/" class="btn-voltar">Cancelar e Voltar</a>
    </div>

</body>
</html>
