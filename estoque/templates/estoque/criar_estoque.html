{% extends 'base.html' %}

{% block content %}
<div class="max-w-xl mx-auto mt-10 bg-white p-6 rounded shadow">

    <h1 class="text-2xl font-bold mb-4">Criar Estoque</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="space-y-4">
            {{ form.as_p }}
        </div>

        <button type="submit"
                class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">
            Salvar
        </button>
    </form>

</div>
{% endblock %}
