<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Clientes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; padding: 50px; }
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); width: 100%; max-width: 600px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #2c3e50; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-salvar { background: #3498db; color: white; border: none; padding: 12px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; }
        .btn-voltar { display: block; text-align: center; margin-top: 15px; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>
  {% if messages %}
    <div id="notificacao-container" class="container-notificacao">
        {% for message in messages %}
            <div class="nuvem-alerta">
                <i class="fas fa-exclamation-triangle"></i>
                <span>CPF já cadastrado!</span>
                <div class="barra-tempo"></div>
            </div>
        {% endfor %}
    </div>

    <script>
        // Função para sumir com a notificação
        setTimeout(function() {
            var container = document.getElementById('notificacao-container');
            if (container) {
                // Adiciona uma transição suave de sumiço
                container.style.transition = "opacity 0.8s ease, transform 0.8s ease";
                container.style.opacity = "0";
                container.style.transform = "translateX(100px)";
                
                // Remove do HTML de vez após a transição acabar
                setTimeout(function() {
                    container.remove();
                }, 800);
            }
        }, 4000); // 4000 milissegundos = 4 segundos
    </script>
{% endif %}
<style>
    .container-notificacao {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 1000;
        pointer-events: none; /* Evita que o balão bloqueie cliques enquanto some */
    }

    .nuvem-alerta {
        background-color: #e74c3c;
        color: white;
        padding: 16px 25px;
        border-radius: 12px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 600;
        animation: entrada-suave 0.5s ease-out forwards;
    }

    /* Barra de tempo que "corre" no pé do balão */
    .barra-tempo {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 4px;
        background: rgba(255,255,255,0.4);
        width: 100%;
        animation: progresso-tempo 4s linear forwards;
    }

    @keyframes entrada-suave {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
    }

    @keyframes progresso-tempo {
        from { width: 100%; }
        to { width: 0%; }
    }
</style>
    <div class="form-container">
        <h2 style="margin-bottom: 25px; color: #2c3e50;"><i class="fas fa-edit"></i> Editando: {{ clients.nome }}</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="form-group">
                <label>Nome Completo:</label>
                <input type="text" name="nome" required value="{{ clients.nome }}">
            </div>
            
            <div class="form-group">
                <label>E-mail:</label>
                <input type="email" name="email" value="{{ clients.email|default:'' }}">
            </div>
            
            <div class="form-group">
                <label>Telefone:</label>
                <input type="text" name="telefone" value="{{ clients.telefone|default:'' }}">
            </div>
            
            <div class="form-group">
                <label>CPF / CNPJ:</label>
                <input type="text" name="cpf" required value="{{ clients.cpf }}">
            </div>
            
            <button type="submit" class="btn-salvar">Salvar Alterações</button>
        </form>

        <a href="/clients/" class="btn-voltar">Cancelar e Voltar</a>
    </div>

</body>
</html>
