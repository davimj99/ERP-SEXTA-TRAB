{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Transações</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        .entrada {
            color: green;
            font-weight: bold;
        }

        .saida {
            color: red;
            font-weight: bold;
        }

        .credito {
            color: orange;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Lista de Transações</h1>

    <table>
        <thead>
            <tr>
                <th>Descrição</th>
                <th>Valor (R$)</th>
                <th>Tipo</th>
                <th>Data</th>
            </tr>
        </thead>
        <tbody>
            {% for t in transacoes %}
                <tr>
                    <td>{{ t.descricao }}</td>
                    <td>{{ t.valor }}</td>
                    <td class="{{ t.tipo|slugify }}">
                        {{ t.get_tipo_display }}
                    </td>
                    <td>{{ t.data|date:"d/m/Y H:i" }}</td>
                </tr>
            {% empty %}
                <tr>
                    <td colspan="4" style="text-align:center;">
                        Nenhuma transação encontrada.
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
